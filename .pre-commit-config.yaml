# Self-dogfooding: use our own hooks + standard quality tools
repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        exclude: ^specs/
      - id: check-ast
      - id: check-added-large-files
      - id: check-json
      - id: check-symlinks
      - id: check-toml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: no-commit-to-branch

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Our own hooks, run against src/ only. tests/ is excluded: its fixtures
  # under tests/fixtures/ are deliberately "bad" example code for our own
  # test suite, and the test suite itself idiomatically uses forbidden names
  # like `result` far more than production code does (see
  # docs/work-items/10-lint-tests-directory.md).
  - repo: local
    hooks:
      - id: ruff-extra-rules
        name: Extra Python rule checks (self-check)
        description: Run our own AST-based checks against src/
        # `uv run` resolves this project's own managed venv regardless of
        # the ambient shell's PATH, since `language: system` hooks run
        # outside any pre-commit-managed environment (a plain `git commit`,
        # not wrapped in `uv run`, would otherwise use whatever `python` is
        # on PATH, which won't have this src-layout package installed).
        entry: uv run python -m pre_commit_hooks.ast_checks
        language: system
        types: [python]
        files: ^src/
        args: [--fix]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/jendrikseipp/vulture
    rev: "v2.16"
    hooks:
      - id: vulture
        language_version: python3.14
